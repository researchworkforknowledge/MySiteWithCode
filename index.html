<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a14">
  <title>StudyAI Pro | #1 Study Hub for Indian Students</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    :root {
      --bg: #0a0a14;
      --glass-bg: rgba(20, 20, 40, 0.45);
      --glass-border: rgba(255, 255, 255, 0.1);
      --primary: #6c5ce7;
      --primary2: #a29bfe;
      --accent: #00cec9;
      --accent2: #fd79a8;
      --text: #e8e8f8;
      --text2: #a0a0c0;
      --danger: #e74c3c;
      --success: #2ecc71;
      --radius: 20px;
      --radius-sm: 12px;
      --transition: 0.3s cubic-bezier(0.4,0,0.2,1);
    }
    .light-mode {
      --bg: #f0f2fa;
      --glass-bg: rgba(255,255,255,0.7);
      --glass-border: rgba(0,0,0,0.1);
      --text: #1a1a2e;
      --text2: #4a4a6a;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      background-image: radial-gradient(ellipse at 20% 10%, rgba(108,92,231,0.15) 0%, transparent 55%),
                        radial-gradient(ellipse at 80% 90%, rgba(0,206,201,0.12) 0%, transparent 55%);
      background-attachment: fixed;
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
      transition: var(--transition);
      overflow-x: hidden;
    }
    ::-webkit-scrollbar{width:5px;}
    ::-webkit-scrollbar-thumb{background:var(--primary);border-radius:10px;}
    .header{
      background: var(--glass-bg); backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
      border-bottom:1px solid var(--glass-border);
      padding:8px 16px; display:flex; align-items:center; justify-content:space-between;
      flex-wrap:wrap; gap:6px; position:sticky; top:0; z-index:110; min-height:52px;
    }
    .logo-area{display:flex; align-items:center; gap:8px; min-width:0;}
    .logo{
      font-size:clamp(1.1rem,2.5vw,1.5rem); font-weight:900;
      background:linear-gradient(135deg,var(--primary2),var(--accent));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
      cursor:pointer; white-space:nowrap;
    }
    .built-by{
      font-size:0.65rem; color:var(--text2); background:rgba(108,92,231,0.15);
      padding:3px 10px; border-radius:20px; border:1px solid rgba(108,92,231,0.3);
      white-space:nowrap; letter-spacing:0.3px; flex-shrink:0;
    }
    .header-actions{display:flex; gap:6px; align-items:center; flex-wrap:wrap;}
    select,button,input,textarea{
      padding:8px 12px; border-radius:25px; border:1px solid var(--glass-border);
      background:rgba(34,34,64,0.6); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
      color:var(--text); font-size:0.82rem; transition:var(--transition); font-family:inherit; outline:none;
    }
    button{
      background:var(--primary); border:none; color:#fff; font-weight:600; cursor:pointer;
      box-shadow:0 4px 15px rgba(108,92,231,0.3); display:inline-flex; align-items:center; gap:4px; justify-content:center;
    }
    button:hover{transform:translateY(-2px); box-shadow:0 8px 25px rgba(108,92,231,0.5);}
    button.secondary{background:rgba(255,255,255,0.1); color:var(--text); border:1px solid var(--glass-border);}
    button.accent{background:var(--accent); color:#000;}
    button.danger{background:var(--danger);}
    .btn-sm{padding:5px 11px; font-size:0.72rem; border-radius:18px;}
    .btn-icon{width:34px; height:34px; border-radius:50%; padding:0; display:flex; align-items:center; justify-content:center; font-size:1.05rem;}
    .hamburger{background:none; border:none; font-size:1.4rem; color:var(--text); cursor:pointer; padding:4px;}
    .sidebar{
      position:fixed; top:0; left:0; height:100vh; width:250px; background:var(--glass-bg);
      backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px); border-right:1px solid var(--glass-border);
      padding:70px 8px 16px; z-index:200; display:flex; flex-direction:column; gap:2px;
      transform:translateX(0); transition:transform 0.3s ease; overflow-y:auto;
    }
    .sidebar.hidden{transform:translateX(-100%);}
    .sidebar .nav-item{
      padding:10px 14px; border-radius:var(--radius-sm); cursor:pointer; display:flex; align-items:center; gap:8px;
      font-weight:500; color:var(--text2); font-size:0.82rem; transition:var(--transition); border:1px solid transparent;
      position:relative;
    }
    .sidebar .nav-item:hover{background:rgba(108,92,231,0.15); color:var(--text);}
    .sidebar .nav-item.active{
      background:rgba(108,92,231,0.25); color:#fff; border:1px solid rgba(108,92,231,0.5);
      box-shadow:0 0 20px rgba(108,92,231,0.25); font-weight:700;
    }
    .sidebar .nav-item.active::before{
      content:''; position:absolute; left:0; top:6px; bottom:6px; width:3px; background:var(--accent);
      border-radius:0 4px 4px 0; box-shadow:0 0 10px var(--accent);
    }
    .backdrop{display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:150;}
    .content{margin-left:250px; padding:20px 20px 40px; transition:margin-left 0.3s ease; min-height:100vh;}
    .content.expanded{margin-left:0;}
    .page-section{display:none; animation:fadeSlide 0.35s ease;}
    .page-section.active{display:block;}
    @keyframes fadeSlide{from{opacity:0;transform:translateY(12px);} to{opacity:1;transform:translateY(0);}}
    .card{
      background:var(--glass-bg); backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px);
      border-radius:var(--radius); padding:18px 20px; margin-bottom:16px; border:1px solid var(--glass-border);
      box-shadow:0 8px 32px rgba(0,0,0,0.3);
    }
    .card:hover{border-color:rgba(108,92,231,0.3); box-shadow:0 12px 40px rgba(0,0,0,0.4);}
    .stat-card{
      background:var(--glass-bg); backdrop-filter:blur(18px); border-radius:var(--radius-sm);
      padding:14px; text-align:center; border:1px solid var(--glass-border);
    }
    .stat-card:hover{transform:translateY(-2px); border-color:rgba(108,92,231,0.4);}
    .stat-card .num{font-size:clamp(1.6rem,3.5vw,2.4rem); font-weight:900; background:linear-gradient(135deg,var(--primary2),var(--accent)); -webkit-background-clip:text; -webkit-text-fill-color:transparent;}
    .timer-display{font-size:clamp(2.5rem,8vw,5rem); font-weight:900; text-align:center; letter-spacing:4px; background:linear-gradient(135deg,var(--accent),var(--primary2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent;}
    .chart-container{max-width:650px; margin:0 auto; min-height:250px; position:relative;}
    .chart-container canvas{width:100%!important; height:100%!important;}
    .flashcard{perspective:1200px; height:200px; cursor:pointer; margin:10px 0;}
    .flashcard-inner{position:relative; width:100%; height:100%; transition:transform 0.7s; transform-style:preserve-3d;}
    .flashcard.flipped .flashcard-inner{transform:rotateY(180deg);}
    .flashcard-front,.flashcard-back{position:absolute; width:100%; height:100%; backface-visibility:hidden; border-radius:var(--radius); display:flex; align-items:center; justify-content:center; padding:20px; font-weight:600; font-size:1rem;}
    .flashcard-front{background:linear-gradient(135deg,var(--primary),#4a3db5); color:#fff;}
    .flashcard-back{background:rgba(26,26,46,0.7); transform:rotateY(180deg); border:2px solid var(--primary2); color:var(--text);}
    .chat-box{max-height:300px; overflow-y:auto; display:flex; flex-direction:column; gap:8px; padding:10px; background:rgba(0,0,0,0.15); border-radius:var(--radius-sm); margin-bottom:10px;}
    .chat-msg{padding:8px 12px; border-radius:16px; max-width:84%; font-size:0.85rem; line-height:1.5;}
    .chat-msg.user{background:var(--primary); color:#fff; align-self:flex-end;}
    .chat-msg.ai{background:rgba(255,255,255,0.08); color:var(--text); align-self:flex-start; border:1px solid var(--glass-border);}
    .toast{position:fixed; bottom:24px; right:24px; background:var(--success); color:#fff; padding:10px 20px; border-radius:25px; z-index:9999; font-weight:600; animation:toastIn 0.4s ease,toastOut 0.4s ease 2.2s forwards; display:none;}
    @keyframes toastIn{from{opacity:0;transform:translateY(30px);} to{opacity:1;transform:translateY(0);}}
    @keyframes toastOut{from{opacity:1;} to{opacity:0;transform:translateY(20px);}}
    body.focus-mode .header,body.focus-mode .sidebar,body.focus-mode .backdrop{display:none!important;}
    body.focus-mode .content{margin-left:0; padding:0;}
    .focus-overlay{display:none; position:fixed; inset:0; background:rgba(0,0,0,0.88); backdrop-filter:blur(12px); flex-direction:column; align-items:center; justify-content:center; gap:20px; z-index:500;}
    body.focus-mode .focus-overlay{display:flex;}
    .focus-overlay textarea{width:85%; max-width:480px; background:rgba(255,255,255,0.08); color:#fff; border:1px solid rgba(255,255,255,0.25); border-radius:var(--radius-sm); padding:14px; font-size:1rem; resize:none; min-height:70px;}
    .modal{position:fixed; inset:0; background:rgba(0,0,0,0.55); backdrop-filter:blur(5px); display:flex; justify-content:center; align-items:center; z-index:600; opacity:0; pointer-events:none; transition:opacity 0.3s;}
    .modal.active{opacity:1; pointer-events:all;}
    .modal-content{background:var(--glass-bg); backdrop-filter:blur(18px); padding:28px; border-radius:var(--radius); border:1px solid var(--glass-border); width:92%; max-width:420px;}
    .quick-task-item,.hw-item{display:flex; gap:8px; align-items:center; background:rgba(255,255,255,0.04); padding:8px 10px; border-radius:8px; margin-bottom:3px;}
    .quick-task-item.done span,.hw-item.done span{text-decoration:line-through; opacity:0.55;}
    .music-meta{font-size:0.7rem; color:var(--accent); margin-top:4px; text-align:center;}
    @media(max-width:1024px){.sidebar{width:230px;}.content{margin-left:230px;}.content.expanded{margin-left:0;}}
    @media(max-width:768px){
      .sidebar{width:270px; transform:translateX(-100%); z-index:250; padding-top:60px;}
      .sidebar.open{transform:translateX(0);}
      .content{margin-left:0; padding:12px;}
      .backdrop.show{display:block;}
      .timer-display{font-size:2.8rem;}
      .header{padding:8px 10px; gap:4px;}
      .header-actions{gap:3px;}
      select{padding:7px 9px; font-size:0.72rem;}
      .stat-card{padding:10px;}
      .chart-container{min-height:200px;}
      .flashcard{height:160px;}
      .focus-overlay textarea{width:90%;}
      .logo{font-size:1.1rem;}
      .built-by{font-size:0.6rem; padding:2px 8px;}
    }
  </style>
</head>
