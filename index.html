<script>
  (() => {
    /* ---------- 1. CORE STATE & PERSISTENCE ---------- */
    const defaultState = {
      board: 'CBSE', studentClass: '10', subject: 'Mathematics', theme: 'dark',
      timer: { seconds: 1500, mode: 25, running: false, sessionsToday: 0 },
      stats: { studyHours: 0, quizzes: 0, hwDone: 0, streak: 0 },
      dailySessions: {}, lastActiveDate: null, lofiPlaying: false,
      notes: [], homework: [], flashcards: [], examDate: null, weakTopics: [], quickTasks: []
    };

    let state = JSON.parse(localStorage.getItem('studyAIState')) || defaultState;
    state = { ...defaultState, ...state }; // Ensure new keys exist

    const save = () => localStorage.setItem('studyAIState', JSON.stringify(state));
    const toast = msg => { 
      const t = document.getElementById('toast'); 
      t.textContent = msg; t.style.display = 'block'; 
      setTimeout(() => t.style.display = 'none', 2500); 
    };

    /* ---------- 2. ULTIMATE NAVIGATION (Fixes "Stuck" Issue) ---------- */
    window.showPage = (pageName) => {
      // Hide ALL sections first
      document.querySelectorAll('.page-section').forEach(section => {
        section.classList.remove('active');
        section.style.display = 'none';
      });

      // Show the targeted section
      const target = document.getElementById('page-' + pageName);
      if (target) {
        target.classList.add('active');
        target.style.display = 'block';
      }

      // Update Sidebar UI
      document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
      const activeNav = document.querySelector(`.nav-item[data-page="${pageName}"]`);
      if (activeNav) activeNav.classList.add('active');

      // Refresh specific page data
      if (pageName === 'dashboard') refreshDashboard();
      if (pageName === 'formulas') generateFormulaSheet();
      
      if (window.innerWidth <= 768) closeSidebar();
      window.scrollTo(0, 0);
    };

    /* ---------- 3. LOFI MUSIC ENGINE (Fixed) ---------- */
    const lofiAudio = document.getElementById('lofiAudio');
    lofiAudio.src = 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3'; 
    
    window.toggleMusic = () => {
      if (lofiAudio.paused) {
        lofiAudio.play().then(() => {
          state.lofiPlaying = true;
          updateMusicUI(true);
          save();
        }).catch(() => toast('🎵 Click again to play Lofi!'));
      } else {
        lofiAudio.pause();
        state.lofiPlaying = false;
        updateMusicUI(false);
        save();
      }
    };

    function updateMusicUI(isPlaying) {
      const btn = document.getElementById('musicToggleBtn');
      const inlineBtn = document.getElementById('lofiInlineBtn');
      btn.textContent = isPlaying ? '⏸️' : '🎵';
      if(inlineBtn) inlineBtn.textContent = isPlaying ? '⏸️ Lo-Fi On' : '🎵 Lo-Fi Beats';
    }

    /* ---------- 4. AI FEATURE SIMULATORS (The "More Features" Part) ---------- */
    
    // CBQ Predictor Logic
    window.runPrediction = () => {
      const out = document.getElementById('predictionOutput');
      out.innerHTML = "🔮 <em>Analyzing previous trends...</em>";
      setTimeout(() => {
        out.innerHTML = `<div class="card" style="border-left: 4px solid var(--accent)">
          <strong>High Probability CBQ:</strong> "A real estate developer uses the quadratic formula to calculate area..." <br>
          <small>Focus on: Real-world application of ${state.subject} Section C.</small>
        </div>`;
      }, 1500);
    };

    // Mind Map Generator
    window.generateMindMap = () => {
      const topic = document.getElementById('mindmapTopic').value || "Central Topic";
      const canvas = document.getElementById('mindmapCanvas');
      canvas.innerHTML = `<div style="display:flex; flex-direction:column; align-items:center; gap:20px; padding:20px;">
        <div class="card" style="background:var(--primary); color:white;">${topic}</div>
        <div style="display:flex; gap:10px;">
          <div class="stat-card">Concept A</div>
          <div class="stat-card">Concept B</div>
          <div class="stat-card">Concept C</div>
        </div>
      </div>`;
      toast("Mind Map Generated!");
    };

    // AI Doubt Solver
    window.askDoubt = () => {
      const input = document.getElementById('doubtInput');
      const chat = document.getElementById('doubtChat');
      if (!input.value) return;

      chat.innerHTML += `<div class="chat-msg user">${input.value}</div>`;
      const userQuery = input.value;
      input.value = '';

      setTimeout(() => {
        chat.innerHTML += `<div class="chat-msg ai">🤖 Analyzing "${userQuery}"... <br> Based on ${state.board} guidelines, you should solve this by using the step-by-step substitution method.</div>`;
        chat.scrollTop = chat.scrollHeight;
      }, 1000);
    };

    /* ---------- 5. POMODORO & STATS SYSTEM ---------- */
    let timerInt = null;
    window.startTimer = () => {
      if (state.timer.running) return;
      state.timer.running = true;
      timerInt = setInterval(() => {
        if (state.timer.seconds > 0) {
          state.timer.seconds--;
          updateTimerDisplay();
        } else {
          clearInterval(timerInt);
          state.timer.running = false;
          state.stats.studyHours += 0.4;
          state.timer.sessionsToday++;
          toast("Session Complete! +0.4h added to Dashboard.");
          refreshDashboard();
          updateChart();
          save();
        }
      }, 1000);
    };

    window.pauseTimer = () => { clearInterval(timerInt); state.timer.running = false; save(); };
    window.resetTimer = () => { 
      pauseTimer(); 
      state.timer.seconds = state.timer.mode * 60; 
      updateTimerDisplay(); 
    };

    function updateTimerDisplay() {
      const m = Math.floor(state.timer.seconds / 60);
      const s = state.timer.seconds % 60;
      const display = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
      document.getElementById('timerDisplay').textContent = display;
      document.getElementById('focusTimerDisplay').textContent = display;
    }

    /* ---------- 6. DASHBOARD & QUICK TASKS ---------- */
    window.addQuickTask = () => {
      const inp = document.getElementById('quickTaskInput');
      if(!inp.value) return;
      state.quickTasks.push({text: inp.value, done: false});
      inp.value = ''; save(); renderQuickTasks();
    };

    window.toggleQuickTask = i => { state.quickTasks[i].done = !state.quickTasks[i].done; save(); renderQuickTasks(); };
    window.deleteQuickTask = i => { state.quickTasks.splice(i, 1); save(); renderQuickTasks(); };

    function renderQuickTasks() {
      const list = document.getElementById('quickTaskList');
      list.innerHTML = state.quickTasks.map((t, i) => `
        <div class="quick-task-item">
          <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleQuickTask(${i})">
          <span style="${t.done ? 'text-decoration:line-through; opacity:0.5' : ''}">${t.text}</span>
          <button class="btn-sm danger" onclick="deleteQuickTask(${i})">✕</button>
        </div>`).join('');
    }

    function refreshDashboard() {
      document.getElementById('dashBoard').textContent = state.board;
      document.getElementById('dashClass').textContent = 'Class ' + state.studentClass;
      document.getElementById('dashSubject').textContent = state.subject;
      
      document.getElementById('statsGrid').innerHTML = `
        <div class="stat-card"><div class="num">${state.stats.studyHours.toFixed(1)}</div><div class="lbl">📖 Hours</div></div>
        <div class="stat-card"><div class="num">${state.stats.quizzes}</div><div class="lbl">❓ Quizzes</div></div>
        <div class="stat-card"><div class="num">${state.stats.hwDone}</div><div class="lbl">✅ HW Done</div></div>
        <div class="stat-card"><div class="num">${state.stats.streak}</div><div class="lbl">🔥 Streak</div></div>
      `;
      renderQuickTasks();
    }

    /* ---------- 7. CHART & INITIALIZATION ---------- */
    let weeklyChart;
    function initChart() {
      const ctx = document.getElementById('weeklyChart').getContext('2d');
      weeklyChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
          datasets: [{ label: 'Study Hours', data: [0,0,0,0,0,0,0], backgroundColor: '#6c5ce7', borderRadius: 8 }]
        },
        options: { responsive: true, scales: { y: { beginAtZero: true } } }
      });
    }

    function updateChart() {
      const day = (new Date().getDay() + 6) % 7; // Monday = 0
      weeklyChart.data.datasets[0].data[day] = state.stats.studyHours;
      weeklyChart.update();
    }

    // Sidebar/Theme Handlers
    window.toggleSidebar = () => document.getElementById('sidebar').classList.toggle('open');
    window.closeSidebar = () => document.getElementById('sidebar').classList.remove('open');
    window.toggleTheme = () => {
      document.body.classList.toggle('light-mode');
      state.theme = document.body.classList.contains('light-mode') ? 'light' : 'dark';
      save();
    };

    function init() {
      if(state.theme === 'light') document.body.classList.add('light-mode');
      document.getElementById('boardSelect').value = state.board;
      document.getElementById('classSelect').value = state.studentClass;
      document.getElementById('subjectSelect').value = state.subject;
      
      initChart();
      updateChart();
      updateTimerDisplay();
      showPage('dashboard'); // Start on dashboard
    }

    init();
  })();
</script>
